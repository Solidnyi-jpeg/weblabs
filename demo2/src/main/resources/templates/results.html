<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Succeeded</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="subpixel-antialiased font-sans bg-gray-100">


<nav class="sticky top-0 h-20 bg-[#243c5a] p-5 sm:px-24 xl:px-64">
    <div class="mx-auto flex justify-between items-center">
        <a href="#" class="uppercase text-white text-xl xl:text-3xl font-bold tracking-tighter">
            My Website
        </a>
        <div class="hidden md:block">
            <a href="/" class="px-4 uppercase text-white font-bold hover:text-green-400">Home</a>
        </div>
    </div>
</nav>


<section class="bg-green-500 py-20 text-center">
    <h1 class="uppercase text-white text-4xl md:text-5xl font-bold">
        Registration Successful
    </h1>

    <div class="flex justify-center items-center py-6">
        <span class="h-1 w-24 bg-white rounded-full mx-2"></span>
        <span class="text-white text-2xl">★</span>
        <span class="h-1 w-24 bg-white rounded-full mx-2"></span>
    </div>

    <p class="text-white text-xl">
        Thank you for registering!
    </p>
</section>

<section class="py-16">
    <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-2xl p-10">

        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">
            Your Details
        </h2>

        <div class="space-y-6 text-lg">

            <div class="flex justify-between border-b pb-2">
                <span class="font-semibold text-gray-600">Full Name:</span>
                <span class="text-gray-800" th:text="${contactForm.name}"></span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="font-semibold text-gray-600">E-mail:</span>
                <span class="text-gray-800" th:text="${contactForm.email}"></span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="font-semibold text-gray-600">Phone:</span>
                <span class="text-gray-800" th:text="${contactForm.phone}"></span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="font-semibold text-gray-600">Message:</span>
                <span class="text-gray-800 text-right max-w-xs break-words"
                      th:text="${contactForm.message}"></span>
            </div>

        </div>

        <div class="text-center mt-10">
            <a href="/" 
               class="bg-green-500 hover:bg-green-600 text-white font-semibold px-8 py-3 rounded-lg transition duration-300">
                Back to Home
            </a>
        </div>

    </div>
</section>




</body>
</html>
